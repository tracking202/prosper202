worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time $upstream_response_time';

    access_log /var/log/nginx/access.log main buffer=64k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # ── Security ─────────────────────────────────────────────────
    server_tokens off;

    # ── Performance ───────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  30;
    keepalive_requests 1000;

    # ── Buffers & Limits ──────────────────────────────────────
    client_max_body_size    10m;
    client_body_buffer_size 128k;
    large_client_header_buffers 4 16k;

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Upstream: PHP-FPM ─────────────────────────────────────
    upstream php-fpm {
        server app:9000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;
        root /var/www/html;
        index index.php index.html;

        # ── Security headers ──────────────────────────────────
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Deny config files (exact match = highest priority) ─
        # Must use exact-match (=) so they take priority over the
        # regex \.php$ handler. Regex locations match in order,
        # so a regex deny AFTER the PHP handler is dead code.
        location = /202-config.php        { deny all; access_log off; log_not_found off; }
        location = /202-config-sample.php { deny all; access_log off; log_not_found off; }

        # ── Deny dotfiles (.git, .env, .htaccess, etc.) ───────
        # Placed before the PHP handler so /.<anything>.php is
        # denied rather than executed.
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Nginx-only health (for container orchestration) ───
        # Returns 200 without hitting PHP-FPM, so nginx isn't
        # marked unhealthy when the app container is restarting.
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── Health check (internal only) ──────────────────────
        # Exposes DB/memcached status — restrict to Docker networks
        # and localhost to prevent infrastructure info leaking.
        location = /health/ {
            allow 127.0.0.0/8;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny  all;
            access_log off;
            try_files $uri /health/index.php$is_args$args;
        }

        # ── Static assets — served directly by Nginx ──────────
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 30d;
            access_log off;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ── Tracking redirect hot path ────────────────────────
        # These are the latency-critical click tracking endpoints.
        # Minimal buffering, no gzip (responses are 302 redirects).
        location /tracking202/redirect/ {
            gzip off;
            fastcgi_buffering off;
            try_files $uri /tracking202/redirect/$fastcgi_script_name;

            location ~ \.php$ {
                include fastcgi_params;
                fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                fastcgi_pass php-fpm;
                fastcgi_connect_timeout 2s;
                fastcgi_send_timeout    5s;
                fastcgi_read_timeout    5s;
                fastcgi_keep_conn on;
            }
        }

        # ── API v3 ────────────────────────────────────────────
        location /api/v3/ {
            try_files $uri /api/v3/index.php$is_args$args;
        }

        # ── API v2 (legacy) ───────────────────────────────────
        location /api/v2/ {
            try_files $uri /api/v2/index.php$is_args$args;
        }

        # ── General catch-all rewrite ─────────────────────────
        location / {
            try_files $uri $uri/ /index.php$is_args$args;
        }

        # ── PHP handler ───────────────────────────────────────
        location ~ \.php$ {
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_pass php-fpm;
            fastcgi_connect_timeout 5s;
            fastcgi_send_timeout   30s;
            fastcgi_read_timeout   30s;
            fastcgi_keep_conn on;
            fastcgi_index index.php;
        }

    }
}
