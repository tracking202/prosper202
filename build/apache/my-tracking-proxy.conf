<VirtualHost *:80>
    ServerName my.tracking202.com
    ServerAlias my.tracking202.com

    ProxyPreserveHost On
    ProxyPass / http://host.docker.internal:8081/
    ProxyPassReverse / http://host.docker.internal:8081/
</VirtualHost>

<VirtualHost *:443>
    ServerName my.tracking202.com
    ServerAlias my.tracking202.com

    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/my.tracking202.com.crt
    SSLCertificateKeyFile /etc/apache2/ssl/my.tracking202.com.key

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    ProxyPass / http://host.docker.internal:8081/
    ProxyPassReverse / http://host.docker.internal:8081/
</VirtualHost>
