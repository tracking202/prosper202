; ── OPcache — Production ──────────────────────────────────
; Precompiles PHP to bytecode. Critical for tracking latency.

[opcache]
opcache.enable = 1
opcache.enable_cli = 0

; Memory: 128 MB shared for compiled scripts.
opcache.memory_consumption = 128

; Max cached scripts — Prosper202 has ~200 files, generous headroom.
opcache.max_accelerated_files = 10000

; Interned strings buffer for class/function names.
opcache.interned_strings_buffer = 16

; Never revalidate in production — deploy = restart container.
opcache.validate_timestamps = 0

; JIT (PHP 8.3): tracing mode for hot-path tracking code.
opcache.jit = tracing
opcache.jit_buffer_size = 64M
