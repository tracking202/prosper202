; ── Pool: www ──────────────────────────────────────────────
; Tuned for high-traffic tracking workloads.
; Each click redirect is short-lived (~5-20 ms), so many workers
; can run on modest memory.

[www]
user  = www-data
group = www-data

listen = 0.0.0.0:9000

; ── Process Manager ───────────────────────────────────────
; Static pool avoids fork overhead under load.
; Size this to your container's memory: ~30 MB per worker.
; 64 workers ≈ 2 GB RAM for the PHP-FPM container.
pm = static
pm.max_children = 64

; Status/ping disabled in production — unnecessary attack surface.
; The healthcheck uses cgi-fcgi to the health endpoint instead.
; Uncomment for debugging:
;pm.status_path = /fpm-status
;ping.path      = /fpm-ping
;ping.response  = pong

; ── Timeouts ──────────────────────────────────────────────
request_terminate_timeout = 30s

; ── Logging ───────────────────────────────────────────────
; Slow-log helps identify bottleneck queries/calls in production.
slowlog = /proc/self/fd/2
request_slowlog_timeout = 3s

; Send worker stdout/stderr to container logs
catch_workers_output = yes
decorate_workers_output = no

; ── Resource Limits ───────────────────────────────────────
; Recycle workers after N requests to guard against memory leaks.
pm.max_requests = 10000

; Clear environment for security — config is injected via entrypoint.
clear_env = no
