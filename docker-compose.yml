services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: prosper202
      MYSQL_USER: p202user
      MYSQL_PASSWORD: p202pass
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    ports:
      - "8080:80"
    environment:
      APP_ENV: development
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
