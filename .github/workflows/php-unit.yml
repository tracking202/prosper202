name: Run PHPUnit Tests

on:
  push:
    paths:
      - '**.php'
  pull_request:
    paths:
      - '**.php'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          # The app uses the `memcached` (OO) extension and defines its own procedural
          # memcache_get()/memcache_set() helpers (guarded by function_exists) with a
          # 1-arg signature. The native `memcache` extension exports incompatible
          # procedural functions of the same name; if the runner image ships it, those
          # shadow our helpers and every memcache_get($key) call fails with
          # ArgumentCountError. Disable it (`:memcache`) so CI matches production.
          extensions: mysqli, pdo, pdo_mysql, memcached, :memcache, mbstring, curl, zip, dom, xml, gd, zlib

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            ~/.cache/composer
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Configure Composer authentication
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${GITHUB_TOKEN}" ]; then
            composer config -g github-oauth.github.com "${GITHUB_TOKEN}"
          fi

      - name: Install dependencies and run tests
        id: test_pipeline
        env:
          COMPOSER_ALLOW_SUPERUSER: 1
        run: |
          set +e

          overall="passed"
          final_status=0

          composer install --prefer-dist --no-interaction --no-progress
          install_status=$?
          if [ "${install_status}" -ne 0 ]; then
            install_state="failed"
            overall="failed"
            final_status=1
            echo "::error::Composer install failed with exit code ${install_status}." >&2
          else
            install_state="passed"
          fi

          composer diagnose || true
          diagnose_status=$?
          if [ "${diagnose_status}" -ne 0 ]; then
            diagnose_state="warning"
            echo "::warning::composer diagnose detected issues (exit ${diagnose_status}). This may be a transient infrastructure issue." >&2
          else
            diagnose_state="passed"
          fi

          mkdir -p build/logs
          mkdir_status=$?
          if [ "${mkdir_status}" -ne 0 ]; then
            mkdir_state="failed"
            overall="failed"
            final_status=1
            echo "::error::Unable to prepare build/logs directory (exit ${mkdir_status})." >&2
          else
            mkdir_state="passed"
          fi

          if [ "${install_state}" = "failed" ]; then
            phpunit_state="skipped"
            phpunit_status=0
            echo "::warning::Skipping PHPUnit because dependency installation failed." >&2
          else
            vendor/bin/phpunit --configuration phpunit.ci.xml --verbose --exclude-group integration --no-coverage 2>&1 | tee phpunit_output.txt
            phpunit_status=${PIPESTATUS[0]}

            # Guard against a "false green": a collection-time die()/exit(0) — e.g. a test
            # that bootstraps the DB at load time and the connection fails — aborts PHPUnit
            # before any test runs, yet can exit 0. Require a real run summary with a sane
            # test count so an aborted/empty run is treated as a failure, not a pass.
            #
            # PHPUnit prints two different summary forms: a fully-clean run ends with
            # "OK (N tests, M assertions)", while any failure/skip/risky/incomplete run
            # ends with "Tests: N, Assertions: M, ...". Parse both so a green run isn't
            # misread as zero tests.
            test_count=$(grep -oE 'OK \(([0-9]+) test' phpunit_output.txt | tail -1 | grep -oE '[0-9]+')
            if [ -z "${test_count}" ]; then
              test_count=$(grep -oE 'Tests: [0-9]+' phpunit_output.txt | tail -1 | grep -oE '[0-9]+')
            fi
            min_tests=600

            if [ "${phpunit_status}" -ne 0 ]; then
              phpunit_state="failed"
              overall="failed"
              final_status=1
              echo "::error::PHPUnit reported failures (exit ${phpunit_status})." >&2
            elif [ -z "${test_count}" ] || [ "${test_count}" -lt "${min_tests}" ]; then
              phpunit_state="failed"
              overall="failed"
              final_status=1
              echo "::error::PHPUnit exited 0 but ran only '${test_count:-0}' tests (expected >= ${min_tests}). This usually means the suite aborted during collection (a load-time die()/exit) and would otherwise be a false green." >&2
            else
              phpunit_state="passed"
            fi
          fi

          echo "install_state=${install_state}" >> "$GITHUB_OUTPUT"
          echo "diagnose_state=${diagnose_state}" >> "$GITHUB_OUTPUT"
          echo "mkdir_state=${mkdir_state}" >> "$GITHUB_OUTPUT"
          echo "phpunit_state=${phpunit_state}" >> "$GITHUB_OUTPUT"
          echo "overall=${overall}" >> "$GITHUB_OUTPUT"
          echo "final_status=${final_status}" >> "$GITHUB_OUTPUT"

          status_label() {
            case "$1" in
              passed)
                echo "✅ Passed"
                ;;
              failed)
                echo "❌ Failed"
                ;;
              skipped)
                echo "⏭️ Skipped"
                ;;
              warning)
                echo "⚠️ Warning"
                ;;
              *)
                echo "❓ Unknown"
                ;;
            esac
          }

          {
            echo "### PHPUnit Workflow"
            echo ""
            echo "| Task | Result |"
            echo "| --- | --- |"
            echo "| Composer install | $(status_label "${install_state}") |"
            echo "| composer diagnose | $(status_label "${diagnose_state}") |"
            echo "| Prepare build/logs | $(status_label "${mkdir_state}") |"
            echo "| PHPUnit (unit tests) | $(status_label "${phpunit_state}") |"
            echo ""
            if [ "${overall}" = "failed" ]; then
              echo "> One or more tasks reported problems. Review the job logs for full details."
            else
              echo "> All tasks completed without detected issues."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          exit 0
      - name: Fail when PHPUnit reports issues
        if: ${{ steps.test_pipeline.outputs.overall == 'failed' }}
        run: exit 1
